services:
  - type: web
    name: moneyflow
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_FILE
        value: /var/data/moneyflow.json
      - key: JWT_SECRET
        generateValue: true
      - key: APP_PASSWORD
        sync: false
    disk:
      name: moneyflow-data
      mountPath: /var/data
      sizeGB: 1
